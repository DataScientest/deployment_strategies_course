apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-v1
  namespace: fraud-detection
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fraud-scoring
      track: stable
  template:
    metadata:
      labels:
        app: fraud-scoring
        track: stable
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: fraud-api
          image: fraud-scoring:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_VERSION
              value: v1
