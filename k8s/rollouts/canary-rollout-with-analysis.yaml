apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: fraud-rollout-analysis
  namespace: fraud-detection
spec:
  replicas: 3
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: fraud-scoring
  template:
    metadata:
      labels:
        app: fraud-scoring
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: fraud-api
          image: fraud-scoring:v1
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_VERSION
              value: v1
  strategy:
    canary:
      stableService: fraud-stable
      canaryService: fraud-canary
      steps:
        - setWeight: 10
        - pause:
            duration: 30s
        - analysis:
            templates:
              - templateName: fraud-latency-and-errors
        - setWeight: 25
        - pause:
            duration: 30s
        - analysis:
            templates:
              - templateName: fraud-latency-and-errors
        - setWeight: 50
        - pause:
            duration: 30s
        - analysis:
            templates:
              - templateName: fraud-latency-and-errors
        - setWeight: 100
